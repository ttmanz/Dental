<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dental Pro — Platform Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0F0E0D; --surface: #1A1917; --border: #2C2925;
      --text:   #EDE9E3; --muted:   #706B60; --mid:    #A8A49E;
      --green:  #22C47A; --amber:   #E8A87C; --red:    #D95F5F;
      --blue:   #5B9ED6; --primary: #3D9E8F;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Login screen ─────────────────────────────────────────────────── */
    #login-screen {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .login-box {
      width: 360px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 36px 32px; box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }
    .login-box h1 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .login-box p  { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .lf { margin-bottom: 14px; }
    .lf label { display: block; font-size: 11px; font-weight: 700; color: var(--mid); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .lf input {
      width: 100%; height: 40px; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 0 12px; font-size: 14px; font-family: inherit; background: var(--bg); color: var(--text); outline: none;
    }
    .lf input:focus { border-color: var(--primary); }
    .login-btn {
      width: 100%; padding: 11px; border: none; border-radius: 9px;
      background: var(--primary); color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; margin-top: 4px;
    }
    .login-err { color: var(--red); font-size: 13px; min-height: 18px; margin-top: 10px; text-align: center; }

    /* ── Main app ─────────────────────────────────────────────────────── */
    #app { display: none; flex-direction: column; min-height: 100vh; }
    .topbar {
      height: 56px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px; padding: 0 24px; flex-shrink: 0;
    }
    .topbar-logo { font-size: 15px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .topbar-badge { padding: 2px 8px; border-radius: 6px; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .signout-btn { padding: 6px 14px; border-radius: 7px; border: 1px solid var(--border); background: none; color: var(--mid); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .signout-btn:hover { background: var(--border); }

    /* ── Stats bar ────────────────────────────────────────────────────── */
    .stats-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .stat-chip {
      flex: 1; padding: 16px 20px; text-align: center; border-right: 1px solid var(--border);
    }
    .stat-chip:last-child { border-right: none; }
    .stat-chip-val { font-size: 28px; font-weight: 800; letter-spacing: -.02em; }
    .stat-chip-lbl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
    .green { color: var(--green); } .amber { color: var(--amber); } .red { color: var(--red); } .blue { color: var(--blue); }

    /* ── Main layout ──────────────────────────────────────────────────── */
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 200px; border-right: 1px solid var(--border); padding: 16px 12px; flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; }
    .nav-item { padding: 9px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--mid); display: flex; align-items: center; gap: 8px; transition: all .15s; }
    .nav-item:hover  { background: var(--surface); color: var(--text); }
    .nav-item.active { background: var(--primary); color: #fff; }
    .content { flex: 1; overflow-y: auto; padding: 24px; }

    /* ── Toolbar ──────────────────────────────────────────────────────── */
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
    .toolbar h2 { font-size: 18px; font-weight: 800; flex: 1; }
    .search-input {
      height: 36px; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 0 12px; font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; min-width: 220px;
    }
    .search-input:focus { border-color: var(--primary); }
    .filter-sel {
      height: 36px; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 0 10px; font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); outline: none;
    }
    .btn { padding: 7px 14px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; }
    .btn.primary { background: var(--primary); color: #fff; }
    .btn.primary:hover { background: #2D8B7A; }
    .btn.danger  { background: var(--red); color: #fff; }
    .btn.ghost   { background: none; border: 1.5px solid var(--border); color: var(--mid); }
    .btn.ghost:hover { background: var(--surface); color: var(--text); }

    /* ── Tenant table ─────────────────────────────────────────────────── */
    .tenant-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .tenant-table th { text-align: left; padding: 9px 12px; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; border-bottom: 2px solid var(--border); position: sticky; top: 0; background: var(--bg); }
    .tenant-table td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .tenant-table tr:hover td { background: var(--surface); }
    .plan-badge { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .plan-badge.trial      { background: #1a3a2a; color: var(--green); }
    .plan-badge.solo       { background: #1a2a3a; color: var(--blue); }
    .plan-badge.clinic     { background: #2a1a3a; color: #B794F4; }
    .plan-badge.group      { background: #3a2a1a; color: var(--amber); }
    .plan-badge.enterprise { background: #2a1a1a; color: var(--red); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .status-dot.active    { background: var(--green); }
    .status-dot.trialing  { background: var(--blue); }
    .status-dot.past_due  { background: var(--amber); }
    .status-dot.cancelled { background: var(--red); }
    .status-dot.inactive  { background: var(--muted); }
    .action-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: none; color: var(--mid); font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; margin-left: 4px; }
    .action-btn:hover { background: var(--surface); color: var(--text); }
    .action-btn.red:hover { background: #3a1a1a; border-color: var(--red); color: var(--red); }
    .action-btn.green:hover { background: #1a3a2a; border-color: var(--green); color: var(--green); }

    /* ── Audit log ────────────────────────────────────────────────────── */
    .audit-row { display: grid; grid-template-columns: 160px 140px auto 1fr; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .audit-ts   { color: var(--muted); font-variant-numeric: tabular-nums; }
    .audit-actor{ font-weight: 600; color: var(--text); }
    .audit-action { color: var(--amber); }

    /* ── Panel detail ─────────────────────────────────────────────────── */
    .detail-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .detail-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .detail-field label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 4px; }
    .detail-field .val  { font-size: 14px; font-weight: 600; color: var(--text); }
    .section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin: 20px 0 10px; }

    /* ── Toast ────────────────────────────────────────────────────────── */
    #toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 9999; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- ── Login ─────────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <h1>🦷 Platform Admin</h1>
    <p>Dental Assistant Pro — Superadmin Portal</p>
    <div class="lf"><label>Email</label><input type="email" id="sa-email" placeholder="superadmin@dental.gr" /></div>
    <div class="lf"><label>Password</label><input type="password" id="sa-password" /></div>
    <button class="login-btn" id="sa-login-btn">Sign In</button>
    <div class="login-err" id="sa-err"></div>
  </div>
</div>

<!-- ── App ───────────────────────────────────────────────────────────────── -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">🦷 Dental Pro <span class="topbar-badge">SUPERADMIN</span></div>
    <div class="topbar-right">
      <span id="sa-logged-in-as" style="font-size:12px;color:var(--muted)"></span>
      <button class="signout-btn" id="sa-signout">Sign out</button>
    </div>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-chip"><div class="stat-chip-val" id="s-total">—</div><div class="stat-chip-lbl">Total Practices</div></div>
    <div class="stat-chip"><div class="stat-chip-val green" id="s-active">—</div><div class="stat-chip-lbl">Active</div></div>
    <div class="stat-chip"><div class="stat-chip-val blue"  id="s-trialing">—</div><div class="stat-chip-lbl">Trialing</div></div>
    <div class="stat-chip"><div class="stat-chip-val amber" id="s-past-due">—</div><div class="stat-chip-lbl">Past Due</div></div>
    <div class="stat-chip"><div class="stat-chip-val red"   id="s-cancelled">—</div><div class="stat-chip-lbl">Cancelled</div></div>
    <div class="stat-chip"><div class="stat-chip-val"       id="s-new">—</div><div class="stat-chip-lbl">New (30d)</div></div>
    <div class="stat-chip"><div class="stat-chip-val"       id="s-users">—</div><div class="stat-chip-lbl">Total Users</div></div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="nav-item active" data-view="practices">🏥 Practices</div>
      <div class="nav-item" data-view="audit">📋 Audit Log</div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
const API = ''  // same origin
let SA_TOKEN = localStorage.getItem('sa_token') || null

function saFetch(path, opts = {}) {
  return fetch(API + path, {
    ...opts,
    headers: { 'Authorization': `Bearer ${SA_TOKEN}`, 'Content-Type': 'application/json', ...(opts.headers||{}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  })
}

function toast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg; el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 3000)
}

// ── Login ─────────────────────────────────────────────────────────────────
document.getElementById('sa-login-btn').addEventListener('click', async () => {
  const email = document.getElementById('sa-email').value.trim()
  const pwd   = document.getElementById('sa-password').value
  document.getElementById('sa-err').textContent = ''
  try {
    const res  = await fetch(API + '/api/superadmin/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pwd })
    })
    const data = await res.json()
    if (!res.ok) { document.getElementById('sa-err').textContent = data.error || 'Login failed'; return }
    SA_TOKEN = data.token
    localStorage.setItem('sa_token', SA_TOKEN)
    showApp(data.email)
  } catch { document.getElementById('sa-err').textContent = 'Cannot reach server.' }
})
document.getElementById('sa-password').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('sa-login-btn').click() })

function showApp(email) {
  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('app').style.display = 'flex'
  document.getElementById('sa-logged-in-as').textContent = email || ''
  loadStats()
  showView('practices')
}

document.getElementById('sa-signout').addEventListener('click', () => {
  SA_TOKEN = null; localStorage.removeItem('sa_token')
  document.getElementById('login-screen').style.display = 'flex'
  document.getElementById('app').style.display = 'none'
})

if (SA_TOKEN) {
  // Try to restore session
  const email = JSON.parse(atob(SA_TOKEN.split('.')[1])).email
  showApp(email)
}

// ── Nav ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'))
    item.classList.add('active')
    showView(item.dataset.view)
  })
})

function showView(view) {
  if (view === 'practices') loadPractices()
  if (view === 'audit')     loadAudit()
}

// ── Stats ─────────────────────────────────────────────────────────────────
async function loadStats() {
  const res  = await saFetch('/api/superadmin/stats')
  const s    = await res.json()
  document.getElementById('s-total').textContent    = s.total_practices
  document.getElementById('s-active').textContent   = s.active
  document.getElementById('s-trialing').textContent = s.trialing
  document.getElementById('s-past-due').textContent = s.past_due
  document.getElementById('s-cancelled').textContent= s.cancelled
  document.getElementById('s-new').textContent      = s.new_30d
  document.getElementById('s-users').textContent    = s.total_users
}

// ── Practices ─────────────────────────────────────────────────────────────
let _practices = []
let _q = '', _planFilter = '', _statusFilter = ''

async function loadPractices() {
  const content = document.getElementById('content')
  content.innerHTML = `
    <div class="toolbar">
      <h2>Practices</h2>
      <input class="search-input" id="p-search" placeholder="Search name…" value="${_q}" />
      <select class="filter-sel" id="p-plan">
        <option value="">All plans</option>
        <option value="trial"${_planFilter==='trial'?' selected':''}>Trial</option>
        <option value="solo"${_planFilter==='solo'?' selected':''}>Solo</option>
        <option value="clinic"${_planFilter==='clinic'?' selected':''}>Clinic</option>
        <option value="group"${_planFilter==='group'?' selected':''}>Group</option>
      </select>
      <select class="filter-sel" id="p-status">
        <option value="">All status</option>
        <option value="trialing"${_statusFilter==='trialing'?' selected':''}>Trialing</option>
        <option value="active"${_statusFilter==='active'?' selected':''}>Active</option>
        <option value="past_due"${_statusFilter==='past_due'?' selected':''}>Past Due</option>
        <option value="cancelled"${_statusFilter==='cancelled'?' selected':''}>Cancelled</option>
      </select>
      <button class="btn primary" id="p-refresh-btn">↻ Refresh</button>
    </div>
    <div id="p-table-wrap"><div style="color:var(--muted);padding:20px">Loading…</div></div>`

  document.getElementById('p-search').addEventListener('input', e => { _q = e.target.value })
  document.getElementById('p-plan').addEventListener('change', e => { _planFilter = e.target.value })
  document.getElementById('p-status').addEventListener('change', e => { _statusFilter = e.target.value })
  document.getElementById('p-refresh-btn').addEventListener('click', renderTable)
  renderTable()
}

async function renderTable() {
  const wrap = document.getElementById('p-table-wrap')
  if (!wrap) return
  const params = new URLSearchParams({ limit: 200 })
  if (_q)            params.set('q', _q)
  if (_planFilter)   params.set('plan', _planFilter)
  if (_statusFilter) params.set('status', _statusFilter)
  const res = await saFetch('/api/superadmin/practices?' + params)
  _practices = await res.json()

  wrap.innerHTML = `
    <table class="tenant-table">
      <thead><tr>
        <th>Practice</th><th>Plan</th><th>Status</th>
        <th>Users</th><th>Appts</th><th>Created</th><th>Last Login</th><th>Actions</th>
      </tr></thead>
      <tbody>
        ${_practices.map(p => `
          <tr data-pid="${p.id}">
            <td style="font-weight:700">${p.name}</td>
            <td><span class="plan-badge ${p.plan}">${p.plan}</span></td>
            <td>
              <span class="status-dot ${p.is_active ? p.plan_status : 'inactive'}"></span>
              ${p.is_active ? p.plan_status : 'deactivated'}
              ${p.plan_status==='trialing' && p.trial_ends_at ? '<br><small style="color:var(--muted)">ends '+new Date(p.trial_ends_at).toLocaleDateString()+'</small>' : ''}
            </td>
            <td style="text-align:center">${p.user_count}</td>
            <td style="text-align:center">${p.appointment_count}</td>
            <td style="color:var(--muted)">${new Date(p.created_at).toLocaleDateString()}</td>
            <td style="color:var(--muted)">${p.last_login_at ? new Date(p.last_login_at).toLocaleDateString() : '—'}</td>
            <td>
              <button class="action-btn" onclick="impersonate('${p.id}','${p.name.replace(/'/g,'')}')">👤 Login</button>
              <button class="action-btn" onclick="changePlan('${p.id}')">✏️ Plan</button>
              ${p.is_active
                ? `<button class="action-btn red" onclick="toggleActive('${p.id}',false)">🚫 Deactivate</button>`
                : `<button class="action-btn green" onclick="toggleActive('${p.id}',true)">✅ Activate</button>`}
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`
}

async function impersonate(practiceId, name) {
  if (!confirm(`Sign in as admin of "${name}"? You'll get a 2-hour session.`)) return
  const res  = await saFetch(`/api/superadmin/impersonate/${practiceId}`, { method: 'POST' })
  const data = await res.json()
  if (!res.ok) { toast('Error: ' + data.error); return }
  // Open app in new tab with impersonation token
  const url = `/?_impersonate=${encodeURIComponent(JSON.stringify({ token: data.token, user: data.user }))}`
  window.open(url, '_blank')
  toast(`Opened ${name} as ${data.user.email}`)
}

async function changePlan(practiceId) {
  const plan = prompt('New plan: trial | solo | clinic | group | enterprise')
  if (!plan || !['trial','solo','clinic','group','enterprise'].includes(plan)) return
  const status = prompt('New status: trialing | active | past_due | cancelled', 'active')
  if (!status) return
  const res = await saFetch(`/api/superadmin/practices/${practiceId}`, { method: 'PATCH', body: { plan, plan_status: status } })
  if (res.ok) { toast('Plan updated ✓'); loadStats(); renderTable() }
  else toast('Error updating plan')
}

async function toggleActive(practiceId, activate) {
  const action = activate ? 'Activate' : 'Deactivate'
  if (!confirm(`${action} this practice?`)) return
  const res = await saFetch(`/api/superadmin/practices/${practiceId}`, { method: 'PATCH', body: { is_active: activate } })
  if (res.ok) { toast(`Practice ${activate ? 'activated' : 'deactivated'} ✓`); loadStats(); renderTable() }
  else toast('Error')
}

// ── Audit log ─────────────────────────────────────────────────────────────
async function loadAudit() {
  const content = document.getElementById('content')
  content.innerHTML = '<div class="toolbar"><h2>Platform Audit Log</h2></div><div id="audit-wrap"><div style="color:var(--muted);padding:20px">Loading…</div></div>'
  const res  = await saFetch('/api/superadmin/audit')
  const rows = await res.json()
  const wrap = document.getElementById('audit-wrap')
  if (!rows.length) { wrap.innerHTML = '<div style="color:var(--muted);padding:20px">No audit entries yet.</div>'; return }
  wrap.innerHTML = rows.map(r => `
    <div class="audit-row">
      <span class="audit-ts">${new Date(r.created_at).toLocaleString()}</span>
      <span class="audit-actor">${r.actor_email}</span>
      <span class="audit-action">${r.action}</span>
      <span style="color:var(--mid)">${r.target_type||''} ${r.target_id ? r.target_id.slice(0,8)+'…' : ''}  ${r.detail ? JSON.stringify(r.detail).slice(0,80) : ''}</span>
    </div>`).join('')
}

// ── Handle impersonation token on app load ────────────────────────────────
const urlParams = new URLSearchParams(location.search)
const impersonate_data = urlParams.get('_impersonate')
if (impersonate_data && location.pathname !== '/superadmin') {
  // This runs in the main app — handled by calendar.html JS
}
</script>
</body>
</html>
