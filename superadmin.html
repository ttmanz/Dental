<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dental Pro — Platform Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0F0E0D; --surface: #1A1917; --border: #2C2925;
      --text:   #EDE9E3; --muted:   #706B60; --mid:    #A8A49E;
      --green:  #22C47A; --amber:   #E8A87C; --red:    #D95F5F;
      --blue:   #5B9ED6; --primary: #3D9E8F;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Login ──────────────────────────────────────────────────────────── */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box {
      width: 360px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 36px 32px; box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }
    .login-box h1 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .login-box p  { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .lf { margin-bottom: 14px; }
    .lf label { display: block; font-size: 11px; font-weight: 700; color: var(--mid); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .lf input, .lf select {
      width: 100%; height: 40px; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 0 12px; font-size: 14px; font-family: inherit; background: var(--bg); color: var(--text); outline: none;
    }
    .lf input:focus, .lf select:focus { border-color: var(--primary); }
    .login-btn {
      width: 100%; padding: 11px; border: none; border-radius: 9px;
      background: var(--primary); color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; margin-top: 4px;
    }
    .login-err { color: var(--red); font-size: 13px; min-height: 18px; margin-top: 10px; text-align: center; }

    /* ── App shell ──────────────────────────────────────────────────────── */
    #app { display: none; flex-direction: column; min-height: 100vh; }
    .topbar {
      height: 56px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px; padding: 0 24px; flex-shrink: 0; position: sticky; top: 0; z-index: 50;
    }
    .topbar-logo { font-size: 15px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .topbar-badge { padding: 2px 8px; border-radius: 6px; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .signout-btn { padding: 6px 14px; border-radius: 7px; border: 1px solid var(--border); background: none; color: var(--mid); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .signout-btn:hover { background: var(--border); }

    /* ── Stats bar ──────────────────────────────────────────────────────── */
    .stats-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .stat-chip { flex: 1; padding: 16px 20px; text-align: center; border-right: 1px solid var(--border); }
    .stat-chip:last-child { border-right: none; }
    .stat-chip-val { font-size: 28px; font-weight: 800; letter-spacing: -.02em; }
    .stat-chip-lbl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
    .green { color: var(--green); } .amber { color: var(--amber); } .red { color: var(--red); } .blue { color: var(--blue); }

    /* ── Main layout ────────────────────────────────────────────────────── */
    .main { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 112px); }
    .sidebar { width: 200px; border-right: 1px solid var(--border); padding: 16px 12px; flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; }
    .nav-item { padding: 9px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--mid); display: flex; align-items: center; gap: 8px; transition: all .15s; }
    .nav-item:hover  { background: var(--surface); color: var(--text); }
    .nav-item.active { background: var(--primary); color: #fff; }
    .content { flex: 1; overflow-y: auto; padding: 24px; transition: margin-right .25s; }

    /* ── Toolbar ────────────────────────────────────────────────────────── */
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    .toolbar h2 { font-size: 18px; font-weight: 800; flex: 1; }
    .search-input {
      height: 36px; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 0 12px; font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; min-width: 220px;
    }
    .search-input:focus { border-color: var(--primary); }
    .filter-sel {
      height: 36px; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 0 10px; font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); outline: none;
    }
    .btn { padding: 7px 14px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; }
    .btn.primary { background: var(--primary); color: #fff; }
    .btn.primary:hover { background: #2D8B7A; }
    .btn.danger  { background: var(--red); color: #fff; }
    .btn.ghost   { background: none; border: 1.5px solid var(--border); color: var(--mid); }
    .btn.ghost:hover { background: var(--surface); color: var(--text); }

    /* ── Table ──────────────────────────────────────────────────────────── */
    .tenant-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .tenant-table th { text-align: left; padding: 9px 12px; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; border-bottom: 2px solid var(--border); position: sticky; top: 0; background: var(--bg); }
    .tenant-table td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .tenant-table tbody tr { cursor: pointer; transition: background .1s; }
    .tenant-table tbody tr:hover td { background: var(--surface); }
    .tenant-table tbody tr.selected td { background: #1a2e2b; }
    .plan-badge { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .plan-badge.trial      { background: #1a3a2a; color: var(--green); }
    .plan-badge.solo       { background: #1a2a3a; color: var(--blue); }
    .plan-badge.clinic     { background: #2a1a3a; color: #B794F4; }
    .plan-badge.group      { background: #3a2a1a; color: var(--amber); }
    .plan-badge.enterprise { background: #2a1a1a; color: var(--red); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .status-dot.active    { background: var(--green); }
    .status-dot.trialing  { background: var(--blue); }
    .status-dot.past_due  { background: var(--amber); }
    .status-dot.cancelled { background: var(--red); }
    .status-dot.inactive  { background: var(--muted); }
    .action-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: none; color: var(--mid); font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; margin-left: 4px; }
    .action-btn:hover { background: var(--surface); color: var(--text); }
    .action-btn.red:hover   { background: #3a1a1a; border-color: var(--red);   color: var(--red); }
    .action-btn.green:hover { background: #1a3a2a; border-color: var(--green); color: var(--green); }

    /* ── Detail drawer ──────────────────────────────────────────────────── */
    .drawer {
      width: 0; border-left: 1px solid transparent; overflow: hidden;
      flex-shrink: 0; transition: width .25s, border-color .25s;
      display: flex; flex-direction: column; background: var(--surface);
    }
    .drawer.open { width: 340px; border-color: var(--border); overflow-y: auto; }
    .drawer-inner { padding: 20px; min-width: 340px; }
    .drawer-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 18px; }
    .drawer-title { font-size: 16px; font-weight: 800; flex: 1; }
    .drawer-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; padding: 2px 6px; }
    .drawer-close:hover { color: var(--text); }
    .drawer-section { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin: 18px 0 8px; }
    .drawer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 4px; }
    .drawer-field label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 3px; }
    .drawer-field .val { font-size: 13px; font-weight: 600; color: var(--text); }
    .drawer-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .drawer-btn {
      width: 100%; padding: 10px; border-radius: 9px; border: 1.5px solid var(--border);
      background: none; color: var(--text); font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; text-align: left; transition: all .15s;
    }
    .drawer-btn:hover { background: var(--bg); }
    .drawer-btn.teal  { border-color: var(--primary); color: var(--primary); }
    .drawer-btn.teal:hover  { background: #0d2622; }
    .drawer-btn.danger { border-color: var(--red); color: var(--red); }
    .drawer-btn.danger:hover { background: #2a1010; }
    .drawer-btn.safe   { border-color: var(--green); color: var(--green); }
    .drawer-btn.safe:hover   { background: #0d2018; }
    .user-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .user-row:last-child { border-bottom: none; }
    .user-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .user-name { font-weight: 600; color: var(--text); }
    .user-email { color: var(--muted); font-size: 11px; }
    .user-role { padding: 1px 7px; border-radius: 6px; background: var(--bg); font-size: 10px; font-weight: 700; color: var(--mid); margin-left: auto; flex-shrink: 0; }

    /* ── Plan modal ─────────────────────────────────────────────────────── */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    .modal-box {
      width: 400px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px 28px 24px;
    }
    .modal-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
    .modal-sub   { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; padding: 10px; text-align: center; }

    /* ── Audit log ──────────────────────────────────────────────────────── */
    .audit-row { display: grid; grid-template-columns: 160px 140px auto 1fr; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .audit-ts     { color: var(--muted); font-variant-numeric: tabular-nums; }
    .audit-actor  { font-weight: 600; color: var(--text); }
    .audit-action { color: var(--amber); }

    /* ── Toast ──────────────────────────────────────────────────────────── */
    #toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 9999; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- ── Plan change modal ────────────────────────────────────────────────── -->
<div class="modal-bg" id="plan-modal" style="display:none">
  <div class="modal-box">
    <div class="modal-title">Change Plan</div>
    <div class="modal-sub" id="plan-modal-sub">Update subscription plan and billing status</div>
    <div class="lf">
      <label>Plan</label>
      <select id="plan-modal-plan">
        <option value="trial">Trial</option>
        <option value="solo">Solo</option>
        <option value="clinic">Clinic</option>
        <option value="group">Group</option>
        <option value="enterprise">Enterprise</option>
      </select>
    </div>
    <div class="lf">
      <label>Billing Status</label>
      <select id="plan-modal-status">
        <option value="trialing">Trialing</option>
        <option value="active">Active</option>
        <option value="past_due">Past Due</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="plan-modal-cancel">Cancel</button>
      <button class="btn primary" id="plan-modal-save">Save Changes</button>
    </div>
  </div>
</div>

<!-- ── Login ────────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <h1>🦷 Platform Admin</h1>
    <p>Dental Assistant Pro — Superadmin Portal</p>
    <div class="lf"><label>Username</label><input type="text" id="sa-email" placeholder="TTmanz07" autocomplete="username"/></div>
    <div class="lf"><label>Password</label><input type="password" id="sa-password"/></div>
    <button class="login-btn" id="sa-login-btn">Sign In</button>
    <div class="login-err" id="sa-err"></div>
  </div>
</div>

<!-- ── App ──────────────────────────────────────────────────────────────── -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">🦷 Dental Pro <span class="topbar-badge">SUPERADMIN</span></div>
    <div class="topbar-right">
      <span id="sa-logged-in-as" style="font-size:12px;color:var(--muted)"></span>
      <button class="signout-btn" id="sa-signout">Sign out</button>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar">
    <div class="stat-chip"><div class="stat-chip-val" id="s-total">—</div><div class="stat-chip-lbl">Total Practices</div></div>
    <div class="stat-chip"><div class="stat-chip-val green" id="s-active">—</div><div class="stat-chip-lbl">Active</div></div>
    <div class="stat-chip"><div class="stat-chip-val blue"  id="s-trialing">—</div><div class="stat-chip-lbl">Trialing</div></div>
    <div class="stat-chip"><div class="stat-chip-val amber" id="s-past-due">—</div><div class="stat-chip-lbl">Past Due</div></div>
    <div class="stat-chip"><div class="stat-chip-val red"   id="s-cancelled">—</div><div class="stat-chip-lbl">Cancelled</div></div>
    <div class="stat-chip"><div class="stat-chip-val"       id="s-new">—</div><div class="stat-chip-lbl">New (30d)</div></div>
    <div class="stat-chip"><div class="stat-chip-val"       id="s-users">—</div><div class="stat-chip-lbl">Total Users</div></div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="nav-item active" data-view="practices">🏥 Practices</div>
      <div class="nav-item" data-view="transfer">🔄 Transfer Patients</div>
      <div class="nav-item" data-view="landing">🌐 Landing Page</div>
      <div class="nav-item" data-view="leads">📥 Leads</div>
      <div class="nav-item" data-view="audit">📋 Audit Log</div>
    </div>
    <div class="content" id="content"></div>
    <!-- Detail drawer -->
    <div class="drawer" id="detail-drawer">
      <div class="drawer-inner" id="drawer-inner"></div>
    </div>
  </div>
</div>

<script>
const API = ''
let SA_TOKEN = localStorage.getItem('sa_token') || null
let _selectedPracticeId = null
let _planModalPracticeId = null

function saFetch(path, opts = {}) {
  return fetch(API + path, {
    ...opts,
    headers: { 'Authorization': `Bearer ${SA_TOKEN}`, 'Content-Type': 'application/json', ...(opts.headers||{}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  })
}

function toast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg; el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 3000)
}

// ── Login ─────────────────────────────────────────────────────────────────
document.getElementById('sa-login-btn').addEventListener('click', async () => {
  const email = document.getElementById('sa-email').value.trim()
  const pwd   = document.getElementById('sa-password').value
  document.getElementById('sa-err').textContent = ''
  try {
    const res  = await fetch(API + '/api/superadmin/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pwd })
    })
    const data = await res.json()
    if (!res.ok) { document.getElementById('sa-err').textContent = data.error || 'Login failed'; return }
    SA_TOKEN = data.token
    localStorage.setItem('sa_token', SA_TOKEN)
    showApp(data.email)
  } catch { document.getElementById('sa-err').textContent = 'Cannot reach server.' }
})
document.getElementById('sa-password').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('sa-login-btn').click() })

function showApp(email) {
  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('app').style.display = 'flex'
  document.getElementById('sa-logged-in-as').textContent = email || ''
  loadStats()
  showView('practices')
}

document.getElementById('sa-signout').addEventListener('click', () => {
  SA_TOKEN = null; localStorage.removeItem('sa_token')
  document.getElementById('login-screen').style.display = 'flex'
  document.getElementById('app').style.display = 'none'
})

if (SA_TOKEN) {
  try {
    const email = JSON.parse(atob(SA_TOKEN.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))).email
    showApp(email)
  } catch { localStorage.removeItem('sa_token') }
}

// ── Nav ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'))
    item.classList.add('active')
    closeDrawer()
    showView(item.dataset.view)
  })
})

function showView(view) {
  if (view === 'practices') loadPractices()
  if (view === 'transfer')  loadTransfer()
  if (view === 'landing')   loadLanding()
  if (view === 'leads')     loadLeads()
  if (view === 'audit')     loadAudit()
}

// ── Stats ─────────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const res = await saFetch('/api/superadmin/stats')
    const s   = await res.json()
    document.getElementById('s-total').textContent     = s.total_practices
    document.getElementById('s-active').textContent    = s.active
    document.getElementById('s-trialing').textContent  = s.trialing
    document.getElementById('s-past-due').textContent  = s.past_due
    document.getElementById('s-cancelled').textContent = s.cancelled
    document.getElementById('s-new').textContent       = s.new_30d
    document.getElementById('s-users').textContent     = s.total_users
  } catch {}
}

// ── Practices ─────────────────────────────────────────────────────────────
let _practices = []
let _q = '', _planFilter = '', _statusFilter = ''

async function loadPractices() {
  const content = document.getElementById('content')
  content.innerHTML = `
    <div class="toolbar">
      <h2>Practices</h2>
      <input class="search-input" id="p-search" placeholder="Search name…" value="${_q}"/>
      <select class="filter-sel" id="p-plan">
        <option value="">All plans</option>
        <option value="trial"${_planFilter==='trial'?' selected':''}>Trial</option>
        <option value="solo"${_planFilter==='solo'?' selected':''}>Solo</option>
        <option value="clinic"${_planFilter==='clinic'?' selected':''}>Clinic</option>
        <option value="group"${_planFilter==='group'?' selected':''}>Group</option>
      </select>
      <select class="filter-sel" id="p-status">
        <option value="">All status</option>
        <option value="trialing"${_statusFilter==='trialing'?' selected':''}>Trialing</option>
        <option value="active"${_statusFilter==='active'?' selected':''}>Active</option>
        <option value="past_due"${_statusFilter==='past_due'?' selected':''}>Past Due</option>
        <option value="cancelled"${_statusFilter==='cancelled'?' selected':''}>Cancelled</option>
      </select>
      <button class="btn primary" id="p-refresh-btn">↻ Refresh</button>
    </div>
    <div id="p-table-wrap"><div style="color:var(--muted);padding:20px">Loading…</div></div>`

  document.getElementById('p-search').addEventListener('input', e  => { _q = e.target.value })
  document.getElementById('p-plan').addEventListener('change',   e  => { _planFilter = e.target.value })
  document.getElementById('p-status').addEventListener('change', e  => { _statusFilter = e.target.value })
  document.getElementById('p-refresh-btn').addEventListener('click', renderTable)
  // Search on Enter
  document.getElementById('p-search').addEventListener('keydown', e => { if (e.key === 'Enter') renderTable() })
  renderTable()
}

async function renderTable() {
  const wrap = document.getElementById('p-table-wrap')
  if (!wrap) return
  wrap.innerHTML = '<div style="color:var(--muted);padding:20px">Loading…</div>'
  const params = new URLSearchParams({ limit: 200 })
  if (_q)            params.set('q', _q)
  if (_planFilter)   params.set('plan', _planFilter)
  if (_statusFilter) params.set('status', _statusFilter)
  const res = await saFetch('/api/superadmin/practices?' + params)
  _practices = await res.json()

  wrap.innerHTML = `
    <table class="tenant-table">
      <thead><tr>
        <th>Practice</th><th>Plan</th><th>Status</th>
        <th>Users</th><th>Appts</th><th>Created</th><th>Last Login</th><th>Actions</th>
      </tr></thead>
      <tbody>
        ${_practices.map(p => `
          <tr data-pid="${p.id}" class="${_selectedPracticeId===p.id?'selected':''}">
            <td style="font-weight:700">${p.name}</td>
            <td><span class="plan-badge ${p.plan}">${p.plan}</span></td>
            <td>
              <span class="status-dot ${p.is_active ? p.plan_status : 'inactive'}"></span>
              ${p.is_active ? p.plan_status : 'deactivated'}
              ${p.plan_status==='trialing'&&p.trial_ends_at?'<br><small style="color:var(--muted)">ends '+new Date(p.trial_ends_at).toLocaleDateString()+'</small>':''}
            </td>
            <td style="text-align:center">${p.user_count}</td>
            <td style="text-align:center">${p.appointment_count}</td>
            <td style="color:var(--muted)">${new Date(p.created_at).toLocaleDateString()}</td>

// ── Impersonate ───────────────────────────────────────────────────────────
async function impersonate(practiceId, name) {
  if (!confirm(`Sign in as admin of "${name}"?\nYou will get a 2-hour session in a new tab.`)) return
  const res  = await saFetch(`/api/superadmin/impersonate/${practiceId}`, { method: 'POST' })
  const data = await res.json()
  if (!res.ok) { toast('Error: ' + data.error); return }
  // Open at /app (calendar.html), not / (landing page)
  const url = `/app?_impersonate=${encodeURIComponent(JSON.stringify({ token: data.token, user: data.user }))}`
  window.open(url, '_blank', 'noopener')
  toast(`Opened "${name}" as ${data.user.email}`)
}

// ── Plan modal ────────────────────────────────────────────────────────────
function openPlanModal(practiceId, name, currentPlan, currentStatus) {
  _planModalPracticeId = practiceId
  document.getElementById('plan-modal-sub').textContent = name
  document.getElementById('plan-modal-plan').value   = currentPlan   || 'trial'
  document.getElementById('plan-modal-status').value = currentStatus || 'trialing'
  document.getElementById('plan-modal').style.display = 'flex'
}

document.getElementById('plan-modal-cancel').addEventListener('click', () => {
  document.getElementById('plan-modal').style.display = 'none'
})
document.getElementById('plan-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('plan-modal'))
    document.getElementById('plan-modal').style.display = 'none'
})
document.getElementById('plan-modal-save').addEventListener('click', async () => {
  const plan   = document.getElementById('plan-modal-plan').value
  const status = document.getElementById('plan-modal-status').value
  const btn    = document.getElementById('plan-modal-save')
  btn.disabled = true; btn.textContent = 'Saving…'
  const res = await saFetch(`/api/superadmin/practices/${_planModalPracticeId}`, {
    method: 'PATCH', body: { plan, plan_status: status }
  })
  btn.disabled = false; btn.textContent = 'Save Changes'
  if (res.ok) {
    document.getElementById('plan-modal').style.display = 'none'
    toast('Plan updated ✓')
    loadStats(); renderTable()
    if (_selectedPracticeId === _planModalPracticeId) openDrawer(_planModalPracticeId)
  } else {
    toast('Error updating plan')
  }
})

// ── Toggle active ─────────────────────────────────────────────────────────
async function toggleActive(practiceId, activate, name) {
  const action = activate ? 'Enable' : 'Disable'
  if (!confirm(`${action} practice "${name}"?`)) return
  const res = await saFetch(`/api/superadmin/practices/${practiceId}`, {
    method: 'PATCH', body: { is_active: activate }
  })
  if (res.ok) {
    toast(`Practice ${activate ? 'enabled' : 'disabled'} ✓`)
    loadStats(); renderTable()
    if (_selectedPracticeId === practiceId) openDrawer(practiceId)
  } else toast('Error')
}

async function loadTransferPatients() {
  _transferFrom = document.getElementById('tr-from-sel').value
  if (!_transferFrom) { alert('Please select a source practice first.'); return }
  const btn = document.getElementById('tr-load-btn')
  btn.disabled = true; btn.textContent = 'Loading…'
  try {
    const res = await saFetch(`/api/superadmin/practices/${_transferFrom}/patients`)
    _transferPatients = await res.json()
    const list = document.getElementById('tr-patient-list')
    if (!_transferPatients.length) {
      list.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:10px 0">No patients found in this practice.</div>'
    } else {
      list.innerHTML = `
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <button onclick="selectAllTransfer(true)"  style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;color:var(--mid)">Select all</button>
          <button onclick="selectAllTransfer(false)" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;color:var(--mid)">Clear</button>
        </div>
        ${_transferPatients.map(p => `
          <label style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:4px;background:var(--bg);border:1px solid var(--border)">
            <input type="checkbox" class="tr-patient-cb" data-id="${p.id}" style="accent-color:var(--primary);flex-shrink:0">
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:700">${p.first_name} ${p.last_name}</div>
              <div style="font-size:11px;color:var(--muted)">${p.email||'—'} · ${p.dob ? new Date(p.dob).toLocaleDateString() : ''}</div>
            </div>
          </label>`).join('')}`
      document.querySelectorAll('.tr-patient-cb').forEach(cb => cb.addEventListener('change', updateTransferCount))
    }
    updateTransferCount()
  } catch(e) { document.getElementById('tr-patient-list').innerHTML = `<div style="color:var(--red)">Error: ${e.message}</div>` }
  btn.disabled = false; btn.textContent = 'Load patients'
}

function selectAllTransfer(checked) {
  document.querySelectorAll('.tr-patient-cb').forEach(cb => cb.checked = checked)
  updateTransferCount()
}

function updateTransferCount() {
  const selected = document.querySelectorAll('.tr-patient-cb:checked').length
  document.getElementById('tr-sel-count').textContent = selected ? `${selected} patient${selected>1?'s':''} selected` : ''
  document.getElementById('tr-go-btn').disabled = selected === 0
}

async function doTransfer() {
  const fromId  = document.getElementById('tr-from-sel').value
  const toId    = document.getElementById('tr-to-sel').value
  const patIds  = Array.from(document.querySelectorAll('.tr-patient-cb:checked')).map(cb => cb.dataset.id)
  const history = document.getElementById('tr-opt-history').checked

  if (!fromId)        { alert('Select source practice.'); return }
  if (!toId)          { alert('Select destination practice.'); return }
  if (fromId === toId){ alert('Source and destination must be different.'); return }
  if (!patIds.length) { alert('Select at least one patient.'); return }

  const fromName = document.getElementById('tr-from-sel').selectedOptions[0].text
  const toName   = document.getElementById('tr-to-sel').selectedOptions[0].text
  if (!confirm(`Transfer ${patIds.length} patient${patIds.length>1?'s':''} from "${fromName}" to "${toName}"?\n\nThis cannot be undone.`)) return

  const btn = document.getElementById('tr-go-btn')
  btn.disabled = true; btn.textContent = 'Transferring…'
  const status = document.getElementById('tr-status')
  status.style.color = 'var(--muted)'; status.textContent = 'Working…'

  try {
    const res  = await saFetch('/api/superadmin/transfer-patients', {
      method: 'POST',
      body: { patientIds: patIds, fromPracticeId: fromId, toPracticeId: toId, includeHistory: history }
    })
    const data = await res.json()
    if (res.ok) {
      status.style.color = 'var(--green)'
      status.textContent = `✓ ${data.transferred} patient${data.transferred>1?'s':''} transferred successfully`
      toast(`${data.transferred} patient${data.transferred>1?'s':''} moved to ${toName} ✓`)
      // Reload the patient list to reflect the move
      setTimeout(loadTransferPatients, 800)
    } else {
      status.style.color = 'var(--red)'
      status.textContent = '✗ ' + (data.error || 'Transfer failed')
    }
  } catch(e) {
    status.style.color = 'var(--red)'
    status.textContent = '✗ ' + e.message
  }
  btn.disabled = false; btn.textContent = '🔄 Transfer selected patients'
}

      featured:    document.getElementById('lp-p'+i+'-featured')?.checked||false,
      popularLabel:document.getElementById('lp-p'+i+'-popular')?.value.trim()||'',
      features:    (document.getElementById('lp-p'+i+'-features')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean),
      featuresNo:  (document.getElementById('lp-p'+i+'-featuresno')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean),
    }))
    const cfg = {
      hero: {
        badge:    document.getElementById('lp-hero-badge')?.value.trim()||'',
        title:    document.getElementById('lp-hero-title')?.value.trim()||'',
        subtitle: document.getElementById('lp-hero-subtitle')?.value.trim()||'',
        note:     document.getElementById('lp-hero-note')?.value.trim()||''
      },
      proof,
      pricing,
      cta: {
        title:   document.getElementById('lp-cta-title')?.value.trim()||'',
        sub:     document.getElementById('lp-cta-sub')?.value.trim()||'',
        btnText: document.getElementById('lp-cta-btn')?.value.trim()||'',
        note:    document.getElementById('lp-cta-note')?.value.trim()||''
      },
      pricingHeading: document.getElementById('lp-pricing-heading')?.value.trim()||'',
      pricingSub:     document.getElementById('lp-pricing-sub')?.value.trim()||'',
      pricingNote:    document.getElementById('lp-pricing-note')?.value.trim()||''
    }
    const res = await saFetch('/api/superadmin/landing', { method:'PUT', body: cfg })
    if (res.ok) {
      _landingCfg = cfg
      toast('Landing page saved ✓')
    } else { toast('Save failed') }
  } catch(e) { toast('Error: ' + e.message) }
  btn.disabled = false; btn.textContent = '💾 Save All Changes'
}

// ── Leads view ────────────────────────────────────────────────────────────
async function loadLeads() {
  const el = document.getElementById('content')
  el.innerHTML = `<div class="toolbar"><h2>📥 Leads</h2><button class="btn ghost" id="leads-refresh">↻ Refresh</button></div>
    <div id="leads-wrap"><div style="color:var(--muted);padding:20px">Loading…</div></div>`
  document.getElementById('leads-refresh').addEventListener('click', loadLeads)
  try {
    const res  = await saFetch('/api/superadmin/leads')
    const rows = await res.json()
    const wrap = document.getElementById('leads-wrap')
    if (!rows.length) { wrap.innerHTML = '<div style="color:var(--muted);padding:20px">No leads yet.</div>'; return }
    wrap.innerHTML = `<table class="tenant-table">
      <thead><tr><th>Date</th><th>Name</th><th>Email</th><th>Mobile</th><th>Interest</th></tr></thead>
      <tbody>${rows.map(r=>`
        <tr>
          <td style="color:var(--muted)">${new Date(r.created_at).toLocaleDateString()}</td>
          <td>${r.name||'—'}</td>
          <td><a href="mailto:${r.email}" style="color:var(--primary)">${r.email}</a></td>
          <td><a href="tel:${r.mobile}" style="color:var(--primary)">${r.mobile}</a></td>
          <td><span style="background:${r.interest==='demo'?'var(--blue)':'var(--green)'};color:#fff;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700">${r.interest||'trial'}</span></td>
        </tr>`).join('')}
      </tbody></table>`
  } catch { document.getElementById('leads-wrap').innerHTML = '<div style="color:var(--red);padding:20px">Failed to load leads.</div>' }
}

// ── Audit log ─────────────────────────────────────────────────────────────
async function loadAudit() {
  const content = document.getElementById('content')
  content.innerHTML = '<div class="toolbar"><h2>Platform Audit Log</h2><button class="btn ghost" id="audit-refresh">↻ Refresh</button></div><div id="audit-wrap"><div style="color:var(--muted);padding:20px">Loading…</div></div>'
  document.getElementById('audit-refresh').addEventListener('click', loadAudit)

  try {
    const res  = await saFetch('/api/superadmin/audit')
    const rows = await res.json()
    const wrap = document.getElementById('audit-wrap')
    if (!rows.length) { wrap.innerHTML = '<div style="color:var(--muted);padding:20px">No audit entries yet.</div>'; return }
    wrap.innerHTML = rows.map(r => `
      <div class="audit-row">
        <span class="audit-ts">${new Date(r.created_at).toLocaleString()}</span>
        <span class="audit-actor">${r.actor_email}</span>
        <span class="audit-action">${r.action}</span>
        <span style="color:var(--mid)">${r.target_type||''} ${r.target_id ? r.target_id.slice(0,8)+'…' : ''} ${r.detail ? JSON.stringify(r.detail).slice(0,80) : ''}</span>
      </div>`).join('')
  } catch { document.getElementById('audit-wrap').innerHTML = '<div style="color:var(--red);padding:20px">Failed to load audit log.</div>' }
}
</script>
